<style>

body{
    font-family: Arial, sans-serif;
    background-color:#f4f1ea;
    margin:0;
    padding:0;
}

.container{
    width:80%;
    max-width:700px;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#4b2e2e;
    margin-bottom:30px;
}

.search-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    padding:12px 20px;
    background:#6b4f4f;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#523737;
}

.result{
    margin-top:25px;
    padding:20px;
    background:#faf7f2;
    border-radius:10px;
    line-height:1.8;
}

.label{
    font-weight:bold;
    color:#4b2e2e;
}

.not-found{
    color:red;
    font-weight:bold;
}

</style>
</head>

function kerkoFjalen(){

let fjala = document.getElementById("fjala").value.toLowerCase().trim();

let rezultati = document.getElementById("rezultati");

if(fjalori[fjala]){

let info = fjalori[fjala];

rezultati.innerHTML = `
<p><span class="label">Fjala:</span> ${fjala}</p>
<p><span class="label">Dialekti:</span> ${info.dialekti}</p>
<p><span class="label">Shpjegimi:</span> ${info.shpjegimi}</p>
<p><span class="label">Shembull:</span> "${info.shembull}"</p>
`;

}else{

rezultati.innerHTML = `
<p class="not-found">Fjala nuk u gjend!</p>
`;
